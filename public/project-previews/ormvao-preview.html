<!doctype html>
<html><head><meta charset="utf-8"/><style>
*{box-sizing:border-box}body{margin:0;background:#060606;color:#fff;font-family:Inter,Arial,sans-serif}.screen{width:960px;height:640px;padding:34px;background:#080808}.nav{display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 20px;background:#0f0f0f}.grid{display:grid;grid-template-columns:260px 1fr;gap:18px;margin-top:18px}.panel{border:1px solid rgba(255,255,255,.1);border-radius:18px;background:#0d0d0d;padding:22px}.item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.65)}h1{font-size:42px;letter-spacing:-.05em;margin:0}.table{margin-top:20px;border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden}.tr{display:grid;grid-template-columns:1fr 130px 130px;border-bottom:1px solid rgba(255,255,255,.08);padding:16px;color:rgba(255,255,255,.7)}.head{color:white;background:#111}.stat{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}.card{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px}.num{font-size:34px}</style></head>
<body><div class="screen"><div class="nav"><h1>ormvao markets</h1><span>public procurement management</span></div><div class="grid"><aside class="panel"><div class="item">dashboard</div><div class="item">new market</div><div class="item">suppliers</div><div class="item">deadlines</div><div class="item">reports</div></aside><main class="panel"><div class="stat"><div class="card"><div class="num">24</div><span>active files</span></div><div class="card"><div class="num">8</div><span>pending</span></div><div class="card"><div class="num">12</div><span>suppliers</span></div></div><div class="table"><div class="tr head"><span>market</span><span>status</span><span>budget</span></div><div class="tr"><span>irrigation equipment</span><span>review</span><span>420k mad</span></div><div class="tr"><span>maintenance service</span><span>open</span><span>180k mad</span></div><div class="tr"><span>public works</span><span>closed</span><span>760k mad</span></div></div></main></div></div></body></html>
