<!doctype html>
<html><head><meta charset="utf-8"/><style>
*{box-sizing:border-box}body{margin:0;background:#050505;color:#fff;font-family:ui-monospace,Menlo,monospace}.screen{width:960px;height:640px;display:grid;grid-template-columns:1fr 360px;gap:18px;padding:34px;background:#050505}.panel{border:1px solid rgba(255,255,255,.1);border-radius:18px;background:#0c0c0c;padding:22px}h1{font-size:36px;letter-spacing:-.05em;margin:0 0 20px}.schema{display:grid;gap:14px}.table{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px}.field{display:flex;justify-content:space-between;color:rgba(255,255,255,.55);padding:7px 0}.chat{display:flex;flex-direction:column;gap:12px}.msg{border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;color:rgba(255,255,255,.72)}.bot{background:#111}.input{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:16px;color:rgba(255,255,255,.35)}</style></head>
<body><div class="screen"><section class="panel"><h1>sql chatbot</h1><div class="schema"><div class="table"><b>users</b><div class="field"><span>id</span><span>primary key</span></div><div class="field"><span>email</span><span>varchar</span></div></div><div class="table"><b>messages</b><div class="field"><span>question</span><span>text</span></div><div class="field"><span>sql_query</span><span>text</span></div></div><div class="table"><b>audit_logs</b><div class="field"><span>risk_level</span><span>enum</span></div><div class="field"><span>created_at</span><span>timestamp</span></div></div></div></section><aside class="panel chat"><div class="msg">show users with suspicious activity</div><div class="msg bot">select user_id, count(*) from audit_logs where risk_level = 'high' group by user_id;</div><div class="msg bot">3 records found · query sanitized</div><div class="input">ask database...</div></aside></div></body></html>
